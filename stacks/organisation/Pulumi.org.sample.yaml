config:
  gcp:region: australia-southeast1
  organisation:organisation: "<organisation numeric ID>"
  organisation:billing: "<billing account id (format: XXXXXX-XXXXXX-XXXXXX)>"
  organisation:environments:
    - <environment name a>
    - <environment name b>
  organisation:bindingsOrgAdmin:
    group: "<group:email@domain>"
    sa: # (optional)
      enabled: <true|false>
      name: <service account name (optional, defaults to cicd-org)>
    bindings:
      - <role_id_a>
      - <role_id_b>
  organisation:labels: # (optional) - GCP project labels (keys/values: lowercase, digits, underscores, hyphens only; max 63 chars)
    <key>: <value>
