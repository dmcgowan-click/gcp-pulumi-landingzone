config:
  gcp:region: australia-southeast1
  organisation:organisation: "<organisation numeric ID>"
  organisation:billing: "<billing account id (format: XXXXXX-XXXXXX-XXXXXX)>"
  organisation:environments:
    - name: <environment name a>
      bindings: # (optional) - IAM bindings applied to this environment's folder
        <role_id_a>:
          - <principal a>
          - <principal b>
    - name: <environment name b>
  organisation:bindingsOrgAdmin:
    group: "<group:email@domain>"
    sa: # (optional)
      enabled: <true|false>
      name: <service account name (optional, defaults to cicd-org)>
    bindings:
      - <role_id_a>
      - <role_id_b>
  organisation:apisAdditional: # (optional)
    - <additional api>
  organisation:orgPolicyDisableIAMExternalOrg: true # (optional, defaults to true)
  organisation:orgPolicyDisableServiceAccountKeyCreation: true # (optional, defaults to true)
  # organisation:orgPolicyAdditional: # (optional)
  #   <policy constraint name>:
  #     spec: <policy spec>
  #     dryRunSpec: <dry run policy spec>
  organisation:labels: # (optional) - GCP project labels (keys/values: lowercase, digits, underscores, hyphens only; max 63 chars)
    <key>: <value>
